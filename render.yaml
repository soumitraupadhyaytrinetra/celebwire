services:
  - type: static_site
    name: celebwire
    repo: https://github.com/soumitraupadhyaytrinetra/celebwire.git
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    headers:
      - path: /_astro/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: public, max-age=300
